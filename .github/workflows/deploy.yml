name: Validate and promote Cloudflare Pages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["deploy-*"]

# A release tag is an immutable main commit. It is built once, then the exact
# uploaded artifact is deployed to staging and production; neither deploy job
# runs npm or Astro.
concurrency:
  group: marketing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  CLOUDFLARE_PROJECT: cadence-marketing
  STAGING_URL: https://staging.cadence-marketing.pages.dev
  PRODUCTION_URL: https://cadencehr.ai

jobs:
  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run check:marketing-sync
      - run: npm run build
      - run: npm run a11y:ci

  preview:
    name: Deploy pull-request preview
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish preview
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.CLOUDFLARE_PROJECT }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.head_ref }}

  build-release:
    name: Build immutable release artifact
    if: startsWith(github.ref, 'refs/tags/deploy-')
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release.outputs.sha }}
      release_tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - id: release
        name: Verify tag targets main
        shell: bash
        run: |
          release_sha="$(git rev-list -n 1 "$GITHUB_REF")"
          git fetch origin main
          git merge-base --is-ancestor "$release_sha" origin/main
          printf 'sha=%s\n' "$release_sha" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run check:marketing-sync
      - run: npm run build
      - name: Write deployed revision marker
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: >-
          node -e "require('node:fs').writeFileSync('dist/build-info.json',
          JSON.stringify({sha: process.env.RELEASE_SHA, tag: process.env.RELEASE_TAG}) + '\\n')"
      - uses: actions/upload-artifact@v4
        with:
          name: marketing-release-${{ github.run_id }}
          path: |
            dist
            functions
          if-no-files-found: error
          retention-days: 7

  deploy-staging:
    name: Deploy tagged artifact to staging
    needs: build-release
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: marketing-release-${{ github.run_id }}
      - name: Publish immutable artifact to the staging Pages branch
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.CLOUDFLARE_PROJECT }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: staging
      - name: Verify rendered staging revision and compare route
        env:
          RELEASE_SHA: ${{ needs.build-release.outputs.release_sha }}
          RELEASE_TAG: ${{ needs.build-release.outputs.release_tag }}
        shell: bash
        run: |
          curl --fail --show-error --silent --retry 5 --retry-delay 4 "$STAGING_URL/build-info.json" |
            jq -e --arg sha "$RELEASE_SHA" --arg tag "$RELEASE_TAG" '.sha == $sha and .tag == $tag'
          curl --fail --show-error --silent --retry 5 --retry-delay 4 "$STAGING_URL/compare" >/dev/null

  deploy-production:
    name: Promote same tagged artifact to production
    needs: [build-release, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: marketing-release-${{ github.run_id }}
      - name: Publish the verified staging artifact to the production Pages branch
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.CLOUDFLARE_PROJECT }}
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
      - name: Verify rendered production revision and compare route
        env:
          RELEASE_SHA: ${{ needs.build-release.outputs.release_sha }}
          RELEASE_TAG: ${{ needs.build-release.outputs.release_tag }}
        shell: bash
        run: |
          curl --fail --show-error --silent --retry 5 --retry-delay 4 "$PRODUCTION_URL/build-info.json" |
            jq -e --arg sha "$RELEASE_SHA" --arg tag "$RELEASE_TAG" '.sha == $sha and .tag == $tag'
          curl --fail --show-error --silent --retry 5 --retry-delay 4 "$PRODUCTION_URL/compare" >/dev/null
